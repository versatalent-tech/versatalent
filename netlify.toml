[build]
  command = "bun run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  BUN_VERSION = "1.1.38"

# Ensure database connection doesn't error during build if not available
# The app will use it at runtime instead
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@neondatabase/serverless", "bcryptjs"]
