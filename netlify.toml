[images]
  remote_images = ["https://source.unsplash.com/.*", "https://images.unsplash.com/.*", "https://ext.same-assets.com/.*", "https://ugc.same-assets.com/.*", "https://thehanovertheatre.org/.*"]

[build]
  command = "bun run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  BUN_VERSION = "1.2.8"

# Netlify Forms configuration
[[forms]]
  name = "versatalent-contact"

  [[forms.notifications]]
    type = "email"
    to = ["versatalent.management@gmail.com"]
    subject = "New Contact Form Submission - VersaTalent"

[[forms]]
  name = "versatalent-talent"

  [[forms.notifications]]
    type = "email"
    to = ["versatalent.management@gmail.com"]
    subject = "New Talent Application - VersaTalent"

[[forms]]
  name = "versatalent-brand"

  [[forms.notifications]]
    type = "email"
    to = ["versatalent.management@gmail.com"]
    subject = "New Brand Partnership Inquiry - VersaTalent"

[[forms]]
  name = "versatalent-newsletter"

  [[forms.notifications]]
    type = "email"
    to = ["versatalent.management@gmail.com"]
    subject = "New Newsletter Subscription - VersaTalent"